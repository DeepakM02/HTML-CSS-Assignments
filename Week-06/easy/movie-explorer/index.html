<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer App</title>
    <link href="style.css" rel="stylesheet"/>
    <script src="./script.js"></script>
    <script src="./mock-data.js"></script>
</head>
<body>
    <main id="app">
        <!-- App Header -->
        <header>
            <h1 class="content-header">Movie Explorer App</h1>
        </header>
        <!-- Error Container -->
        <div id="error-container"></div>

        <!-- Loader Spinner -->
        <section id="loading-screen" class="hidden">
            <div class="spinner"></div>
            <p>Loading movies...</p>
        </section>

        <!-- Controller -->
        <section id="controls">
            <select id="select-genre" onchange="onSelectGenre(this)"></select>
            
            <select id="select-items-per-page" onchange="onSelectItemsPerPage(this)">
                <option value="20" selected>Top 20</option>
                <option value="45">Top 40</option>
                <option value="60">Top 60</option>
            </select>

            <!-- Rating Toggle -->
            <div class="sorting-wrapper">
            <span class="sort-by-rating">Sort by Rating</span>
            <label class="switch">
                <input type="checkbox" id="sorting-checkbox" onclick="onToggleRating(event)">
                <span class="slider"></span>
            </label>
            </div>
        </section>

        <!-- Movie Showcase -->
        <section id="movies-section">
            <div id="movie-wrapper"></div>
        </section>
    </main>
</body>
</html>
